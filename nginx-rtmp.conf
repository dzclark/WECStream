# Nginx RTMP Configuration for Church Streaming

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        application live {
            live on;
            record off;
            
            # Enable HLS
            hls on;
            hls_path /opt/rtmp-server/media/live;
            hls_fragment 2s;
            hls_playlist_length 10s;
            
            # Stream key authentication
            on_publish http://localhost:8000/api/rtmp/auth;
            on_publish_done http://localhost:8000/api/rtmp/done;
        }
    }
}

# HTTP server for HLS delivery
http {
    server {
        listen 8888;
        
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /opt/rtmp-server/media;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
        
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
    }
}
